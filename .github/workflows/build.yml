name: 构建 APK

# 手动触发构建，支持选择后端默认值与是否上传 Release
on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: '构建后上传到 GitHub Release'
        type: boolean
        default: true
      tag_name:
        description: 'Release tag 名称（upload_release=true 时使用）'
        type: string
        default: 'v1.0-build'
      is_prerelease:
        description: '标记为预发布'
        type: boolean
        default: true

# 同一分支同时只允许一个构建
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 构建 Release APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          # packages 必须用空格分隔（不能用 YAML 多行 | 块，否则整块被当成单个包名）
          packages: 'platforms;android-34 build-tools;34.0.0 cmake;3.22.1 ndk;26.3.11579264'

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: 生成 gradlew（若仓库未提交 wrapper）
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: 授予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 下载 NCNN 预编译库（Android Vulkan）
        run: |
          cd app/src/main/cpp
          if [ -d ncnn-android-vulkan ] && [ -f ncnn-android-vulkan/lib/arm64-v8a/libncnn.a ]; then
            echo "NCNN 已存在，跳过下载"
            exit 0
          fi
          # NCNN 官方 release: ncnn-20240410-android-vulkan
          wget -q https://github.com/Tencent/ncnn/releases/download/20240410/ncnn-20240410-android-vulkan.zip -O ncnn.zip
          unzip -q ncnn.zip
          mv ncnn-20240410-android-vulkan ncnn-android-vulkan
          rm ncnn.zip
          ls ncnn-android-vulkan/lib/arm64-v8a/

      - name: 构建调试版（验证编译）
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: 构建 Release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: 重命名 APK
        id: apk
        run: |
          mkdir -p artifacts
          SRC="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$SRC" ]; then
            SRC="app/build/outputs/apk/release/app-release.apk"
          fi
          DST="artifacts/FpsAimAssistant-${{ github.sha }}.apk"
          cp "$SRC" "$DST"
          echo "path=$DST" >> $GITHUB_OUTPUT
          echo "name=FpsAimAssistant-$(git describe --tags --always 2>/dev/null || echo ${{ github.sha }} | cut -c1-7).apk" >> $GITHUB_OUTPUT

      - name: 上传构建产物到 Actions
        uses: actions/upload-artifact@v4
        with:
          name: FpsAimAssistant-APK
          path: artifacts/*.apk
          retention-days: 30
          compression-level: 0

      - name: 上传到 GitHub Release
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.tag_name }}
          prerelease: ${{ github.event.inputs.is_prerelease }}
          files: artifacts/*.apk
          body: |
            # FpsAimAssistant 构建

            提交: ${{ github.sha }}
            分支: ${{ github.ref_name }}
            构建时间: ${{ github.run_id }}

            ## 安装说明
            1. 设备需 Root，Android API 29+
            2. 仅支持 arm64-v8a 架构
            3. 安装后授予悬浮窗权限
            4. 选择触摸注入后端（推荐 TwT 驱动）
            5. 将 YOLOv8n 模型（.param/.bin）放入 assets/models/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
